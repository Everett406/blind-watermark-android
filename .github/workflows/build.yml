name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: List APK files
        run: ls -laR app/build/outputs/

      - name: Sleep for verification
        run: sleep 30

      - name: Upload APK using gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG"
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f | head -1)
          echo "APK: $APK_PATH"
          if [ -n "$APK_PATH" ]; then
            gh release create "$TAG" "$APK_PATH" --title "Release $TAG" --generate-notes
          else
            echo "ERROR: No APK found"
            exit 1
          fi
