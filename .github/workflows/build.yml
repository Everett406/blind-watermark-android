name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Find and list APK files
        run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Sleep for verification
        run: sleep 30

      - name: Upload APK using gh CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG"
          gh release upload "$TAG" $(find . -name "*.apk" -type f) --clobber 2>/dev/null || {
            echo "Upload failed, creating release first"
            gh release create "$TAG" $(find . -name "*.apk" -type f) --title "Release $TAG" --generate-notes
          }
