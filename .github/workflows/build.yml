name: Build and Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.2

      - name: Decode signing key
        env:
          SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEY_BASE64" ]; then
            echo "$SIGNING_KEY_BASE64" | base64 -d > app/keystore.jks
            echo "Signing key decoded successfully"
          else
            echo "No SIGNING_KEY_BASE64 secret found, will use debug signing"
          fi

      - name: Build APK
        env:
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_ALIAS_PASSWORD: ${{ secrets.SIGNING_KEY_ALIAS_PASSWORD }}
        run: |
          if [ -f app/keystore.jks ] && [ -n "$SIGNING_KEY_PASSWORD" ]; then
            ./gradlew assembleRelease 2>&1
          else
            ./gradlew assembleDebug 2>&1
          fi

      - name: List build outputs
        run: ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs directory"

      - name: Upload APK to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG"
          APK_PATH=$(find app/build/outputs -name "*.apk" -type f 2>/dev/null | head -1)
          echo "APK: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found"
            exit 1
          fi
          # Delete existing release if it exists, then create new one
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "$APK_PATH" --title "Release $TAG" --generate-notes
